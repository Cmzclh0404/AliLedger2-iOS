name: Build iOS App

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Find available Xcode and select the latest one
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            echo "Using Xcode: $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          else
            echo "Using default Xcode"
          fi
          xcodebuild -version

      - name: Build for Simulator (no code signing needed)
        run: |
          xcodebuild build \
            -project AliLedger2.xcodeproj \
            -scheme AliLedger2 \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build

      - name: Package app as ZIP
        run: |
          APP_PATH=$(find build/Build/Products -name "AliLedger2.app" -type d | head -1)
          echo "App found at: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/AliLedger2.zip" AliLedger2.app

      - name: Build Ad-Hoc IPA (unsigned)
        run: |
          xcodebuild archive \
            -project AliLedger2.xcodeproj \
            -scheme AliLedger2 \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath build/AliLedger2.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            || true

          # If archive fails, create IPA from simulator build
          if [ -d "build/AliLedger2.xcarchive" ]; then
            mkdir -p Payload
            cp -r "build/AliLedger2.xcarchive/Products/Applications/AliLedger2.app" Payload/
            zip -r AliLedger2-unsigned.ipa Payload
            rm -rf Payload
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AliLedger2-iOS
          path: |
            AliLedger2.zip
            AliLedger2-unsigned.ipa
          if-no-files-found: warn
