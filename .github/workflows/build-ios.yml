name: Build iOS App

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_PATH" ]; then
            echo "Using Xcode: $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version

      - name: Build for Simulator (no code signing needed)
        run: |
          xcodebuild build \
            -project AliLedger2.xcodeproj \
            -scheme AliLedger2 \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build

      - name: Package app as ZIP
        run: |
          APP_PATH=$(find build/Build/Products -name "AliLedger2.app" -type d | head -1)
          echo "App found at: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/AliLedger2.zip" AliLedger2.app

      - name: Create unsigned IPA
        run: |
          APP_PATH=$(find build/Build/Products -name "AliLedger2.app" -type d | head -1)
          echo "App found at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r "$GITHUB_WORKSPACE/AliLedger2.ipa" Payload
          rm -rf Payload

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AliLedger2-iOS
          path: |
            AliLedger2.zip
            AliLedger2.ipa
          if-no-files-found: warn
